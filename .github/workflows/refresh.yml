name: Refresh Investimento Dashboard 2025

on:
  workflow_dispatch:        # ano fechado (2025) — dado é histórico, refresh só manual

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Aggregate (pull Meta Ads -> data.json)
        env:
          META_TOKEN_ID:  ${{ secrets.META_TOKEN_ID }}
          META_TOKEN_MEM: ${{ secrets.META_TOKEN_MEM }}
        run: python aggregate.py

      - name: Commit data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Sem mudancas nos dados"
          else
            git commit -m "auto: refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
